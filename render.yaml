services:
  # Backend Web Service
  - type: web
    name: oppty-chats-backend
    env: node
    region: oregon
    plan: free
    rootDir: ./
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"

  # Frontend Static Site
  - type: static
    name: oppty-chats-frontend
    env: static
    region: oregon
    plan: free
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false

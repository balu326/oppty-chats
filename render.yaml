services:
  - type: web
    name: oppty-chats-backend
    env: python
    region: oregon
    plan: free
    rootDir: ./backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed_demo
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: true
      - key: DEBUG
        value: false

services:
  - type: web
    name: oppty-chats-backend
    env: node
    region: oregon
    plan: free
    rootDir: ./backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: true
